unbind C-b
unbind %
unbind a
unbind c
unbind C
unbind l
unbind n
unbind o
unbind p
unbind r
unbind y
unbind '"'

bind M-z send-prefix
bind c kill-pane
bind C kill-window
bind X kill-session
bind y copy-mode
bind f run "~/.config/tmux/scripts/popup.sh"
bind r source-file ~/.tmux.conf \; display "[Reloaded]"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind a setw synchronize-panes
bind l lock-session
bind : command-prompt -p ':'
bind t choose-tree -s


bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r C-h resize-pane -L 1
bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-l resize-pane -R 1
bind -r K new-window
bind -r J confirm-before kill-window
bind -r H previous-window
bind -r L next-window

bind -r 1 select-window -t 1
bind -r 2 select-window -t 2
bind -r 3 select-window -t 3
bind -r 4 select-window -t 4
bind -r 5 select-window -t 5
bind -r 6 select-window -t 6
bind -r 7 select-window -t 7
bind -r 8 select-window -t 8
bind -r 9 select-window -t 9

bind -r M-j swap-pane -D
bind -r M-k swap-pane -U


bind -T copy-mode-vi v     send-keys -X begin-selection
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"

bind-key -T edit-mode-vi WheelUpPane   send-keys -X scroll-up
bind-key -T edit-mode-vi WheelDownPane send-keys -X scroll-down
