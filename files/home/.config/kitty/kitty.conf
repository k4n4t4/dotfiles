font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono NF ExtraBold
italic_font      JetBrainsMono NF Italic
bold_italic_font JetBrainsMono NF ExtraBold Italic

font_size 16.0
disable_ligatures cursor

cursor_shape block
cursor_blink_interval 0
cursor_trail 1
cursor_trail_decay 0.0 0.3
cursor_trail_start_threshold 2

scrollbar never
scrollback_pager ~/.config/kitty/pager.sh INPUT_LINE_NUMBER CURSOR_LINE CURSOR_COLUMN
enable_audio_bell no
bell_on_tab "?"
enabled_layouts splits, stack

tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style   bold-italic
inactive_tab_font_style normal

background_opacity 0.6
# transparent_background_colors #10101f@0.8
dim_opacity 0.2

allow_remote_control yes
listen_on unix:/tmp/kitty

shell fish
editor nvim


#
# key configurations
#

# modifier key
kitty_mod ctrl+alt

# reload configuration
map kitty_mod+shift+r load_config_file

# layout management
map kitty_mod+l next_layout

# font resizing
map kitty_mod+arrowup change_font_size all +1.0
map kitty_mod+arrowdown change_font_size all -1.0
map kitty_mod+equal change_font_size all 0

# window resizing
map kitty_mod+r start_resizing_window

# scrollback
map kitty_mod+p show_scrollback

# window management
map kitty_mod+v launch --location=vsplit --cwd=current
map kitty_mod+s launch --location=hsplit --cwd=current
map kitty_mod+q close_window
map kitty_mod+j next_window
map kitty_mod+k previous_window
map kitty_mod+shift+j move_window_forward
map kitty_mod+shift+k move_window_backward

# tab management
map kitty_mod+n new_tab_with_cwd
map kitty_mod+shift+q close_tab
map kitty_mod+] next_tab
map kitty_mod+[ previous_tab
map kitty_mod+shift+] move_tab_forward
map kitty_mod+shift+[ move_tab_backward

# paste from clipboard
map kitty_mod+shift+v paste_from_clipboard

# url click
mouse_map shift+left click grabbed,ungrabbed mouse_handle_click selection link prompt

# load theme configuration
include ~/.config/kitty/theme.conf

# load local configuration
include ~/.config/kitty/rc.conf

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
